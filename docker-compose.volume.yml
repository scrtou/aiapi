services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - DUMMY_VAR=true
    ulimits:
      core:
        soft: -1
        hard: -1
    volumes:
      - ./logs:/usr/aiapi/src/build/logs
      - ./cores:/usr/aiapi/src/build/cores
      - ./config.json:/usr/aiapi/src/config.json
    ports:
      - "127.0.0.1:5555:5555"
    networks:
      - aiapi_shared
    # 使用 bridge 网络并显式映射端口，避免 host 网络带来的安全风险

networks:
  aiapi_shared:
    external: true
    name: aiapi_shared
