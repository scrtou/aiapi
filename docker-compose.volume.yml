services:
  aiapi:
    image: aiapi
    container_name: aiapi
    build: .
    restart: unless-stopped
    environment:
      - DUMMY_VAR=true
    ulimits:
      core:
        soft: -1
        hard: -1
    volumes:
      - ./logs:/usr/aiapi/src/build/logs
      - ./cores:/usr/aiapi/src/build/cores
      - ./data/config.json:/usr/aiapi/src/config.json
      - ./data:/usr/aiapi/src/build/data
      # 若使用 SQLite，请在 config.json 中将 db_clients[].filename 设为 ./data/aiapi.db
    ports:
      - "55555:55555"
    networks:
      - aiapi_shared
    # 使用 bridge 网络并对外暴露端口，可供公网访问

networks:
  aiapi_shared:
    external: true
    name: aiapi_shared
